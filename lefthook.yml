pre-commit:
  parallel: true
  commands:
    lint:
      run: just lint
    format:
      run: just format-check
    check:
      run: just typecheck
    typos:
      run: just typos
    build:
      run: just build

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
